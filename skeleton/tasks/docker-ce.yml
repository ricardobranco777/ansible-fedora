---
- name: Install Docker repo
  shell: sudo dnf-3 config-manager --add-repo https://download.docker.com/linux/fedora/docker-ce.repo
  args:
    creates: /etc/yum.repos.d/docker-ce.repo

- name: Uninstall Fedora Docker packages
  dnf:
    name:
      - docker-cli
      - moby-engine-rootless-extras
      - rootlesskit
    state: absent

- name: Install Docker packages
  dnf:
    name:
      - docker-ce
      - docker-ce-rootless-extras
    state: present

- name: Modify /etc/default/grub
  replace:
    path: /etc/default/grub
    regexp: '^(GRUB_CMDLINE_LINUX="[\w](?!.*\b{{ item }}\b).*)"$'
    replace: '\1 {{ item }}"'
  with_items:
    - "cgroup_enable=memory"
    - "intel_iommu=on"
    - "iommu=pt"

- name: Copy daemon.json
  copy:
    src: docker/daemon.json
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'

- name: Enable Docker service
  systemd_service:
    name: docker
    enabled: true
    masked: no
    state: started
