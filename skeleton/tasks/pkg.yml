- name: Install package groups
  dnf:
    name:
      - '@c-development'
      - '@container-management'
      - '@development-tools'
      - '@virtualization'
    state: present

- name: Uninstall packages
  dnf:
    name:
      - abrt
      - abrt-libs
      - bash-color-prompt
      - bluez-cups
      - braille-printer-app
      - cups
      - cups-browsed
      - cups-filters*
      - flatpak
      - fprintd
      - fprintd-pam
      - gutenprint
      - gutenprint-cups
      - hplip
      - libppd
      - mediawriter
      - open-vm-tools*
      - PackageKit
      - passim
      - plocate
      - rhythmbox
      - virtualbox-guest-additions
      - zram-generator
    state: absent

- name: Autoremove unneeded packages installed as dependencies
  dnf:
    autoremove: yes
