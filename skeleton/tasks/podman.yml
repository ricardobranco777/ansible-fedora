---
# https://github.com/podman-container-tools/podman/discussions/20718
- name: Configure podman interface for IPv6
  shell: |
    podman network inspect podman |
    jq '.[] | .ipv6_enabled = true | .subnets += [{"subnet":"fd00:88::/64","gateway":"fd00:88::1"}]' |
    tee /etc/containers/networks/podman.json
  args:
    creates: /etc/containers/networks/podman.json
